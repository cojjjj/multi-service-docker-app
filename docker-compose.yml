version: "3.9"

services:
  web:
    build: ./web
    container_name: react-web
    ports:
      - "3000:80"
    depends_on:
      - api
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

  api:
    build: ./api
    container_name: node-api
    ports:
      - "5000:5000"
    depends_on:
      - mongo
      - redis
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000"]
      interval: 30s
      timeout: 10s
      retries: 3

  mongo:
    image: mongo
    container_name: mongodb
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network

  redis:
    image: redis
    container_name: redis
    volumes:
      - redis-data:/data
    networks:
      - app-network

  nginx:
    image: nginx
    container_name: reverse-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - web
      - api
    networks:
      - app-network

volumes:
  mongo-data:
  redis-data:

networks:
  app-network:
